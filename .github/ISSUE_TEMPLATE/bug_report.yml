name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Open dump file with ...
        2. Run command ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected vs Actual Behavior
      description: What you expected to happen, and what actually happened.
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform / Debugger
      options:
        - Windows / CDB (WinDbg)
        - Linux / GDB
        - macOS / LLDB
    validations:
      required: true

  - type: dropdown
    id: python-version
    attributes:
      label: Python Version
      options:
        - "3.12"
        - "3.11"
        - "3.10"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: TriagePilot Version
      description: Output of `pip show triagepilot` or commit hash.
      placeholder: "1.0.0"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Crash Dump Output
      description: Paste any relevant logs or debugger output. **Redact sensitive data** (file paths, symbols, memory addresses that could leak internal info).
      render: text
    validations:
      required: false
