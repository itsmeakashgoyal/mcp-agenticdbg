name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe the problem and your proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this feature solve? Why is it needed?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered.
    validations:
      required: false

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      options:
        - Backends (CDB, GDB, LLDB)
        - Tools (debugger_tools, git_tools)
        - Graph / LangGraph workflow
        - Server / Config
        - Documentation
        - Other
    validations:
      required: true
